# Volatility Regime Strategy Family Grid
# Based on: VIX regime detection, volatility targeting, GARCH concepts

family: volregime

strategies:
  adaptive:
    vol_short: [5, 10, 15]
    vol_long: [30, 50, 100]
    low_vol_mult: [0.6, 0.8]
    high_vol_mult: [1.3, 1.5, 1.8]
    extreme_vol_mult: [2.0, 2.5, 3.0]
    ema_fast: [8, 12]
    ema_slow: [20, 26]

  vix:
    vix_period: [14, 21, 30]
    vix_low: [10, 15, 20]
    vix_high: [25, 30, 40]
    ema_period: [10, 20, 30]

  target:
    target_vol: [0.10, 0.15, 0.20, 0.25]
    vol_lookback: [10, 20, 30]
    ema_fast: [8, 10, 12]
    ema_slow: [20, 30, 50]

  cluster:
    vol_period: [10, 14, 20]
    cluster_threshold: [1.2, 1.5, 2.0]
    ema_period: [10, 20, 30]

# Risk management
risk:
  stop_loss_pct: [0.015, 0.02, 0.025, 0.03]
  take_profit_pct: [0.025, 0.04, 0.05]

# Trading costs
costs:
  profiles:
    conservative:
      slippage_bps: 5
      fee_taker_bps: 6
    base:
      slippage_bps: 3
      fee_taker_bps: 4
    aggressive:
      slippage_bps: 1
      fee_taker_bps: 2

# Position settings
position:
  leverage: [1, 2, 3]
  allow_short: [true, false]

# Symbols and timeframes
symbols: [BTCUSDT]
timeframes: [1h, 4h, 1d]

# Price source for execution
price_source: [next_open, close]

# Filters for overfitting detection
filters:
  min_trades: 20
  max_drawdown_pct: -35
  min_profit_factor: 1.0
  min_sharpe: 0.4
  wfo_positive_ratio: 0.55
  mc_percentile: 50
