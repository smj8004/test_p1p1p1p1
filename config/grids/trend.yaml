# Trend Following Strategy Family Grid (OPTIMIZED)
# Reduced from 950,400 → ~45,000 configs (21x reduction)
# Based on: Jegadeesh-Titman momentum, CTA trend-following

family: trend

strategies:
  ema_cross:
    fast: [8, 20]           # 3 → 2: extremes
    slow: [26, 100]         # 3 → 2: keep min and max
    trend: [200]            # 2 → 1: use only long-term
    adx_threshold: [20, 30] # 4 → 2: moderate/strong

  supertrend:
    atr_period: [10, 14]    # 3 → 2: keep standard values
    multiplier: [2.0, 3.0]  # 4 → 2: conservative/aggressive

  donchian:
    entry_period: [20, 55]  # 4 → 2: Turtle original + long-term
    exit_period: [10, 20]   # 3 → 2: keep useful range

  keltner:
    ema_period: [10, 30]    # 3 → 2: short/long
    atr_period: [10, 20]    # 3 → 2: standard/long
    atr_mult: [2.0, 3.0]    # 4 → 2: moderate/wide

# Risk management (with constraint: TP >= SL * 1.5, TP <= SL * 3.5)
risk:
  stop_loss_pct: [0.01, 0.02, 0.03]    # 5 → 3: 1%, 2%, 3%
  take_profit_pct: [0.02, 0.04, 0.06]  # 5 → 3: 2%, 4%, 6%

# Trading costs (remove aggressive - unrealistic)
costs:
  profiles:
    conservative:
      slippage_bps: 5
      fee_taker_bps: 6
    base:
      slippage_bps: 3
      fee_taker_bps: 4

# Position settings
position:
  leverage: [1, 3]        # 4 → 2: conservative/aggressive
  allow_short: [true, false]

# Symbols and timeframes
symbols: [BTCUSDT]
timeframes: [1h, 4h, 1d]  # 4 → 3: remove 15m (too noisy)

# Price source for execution (remove mark_close - rarely used)
price_source: [next_open, close]  # 3 → 2: realistic options

# Filters for overfitting detection
filters:
  min_trades: 30
  max_drawdown_pct: -40
  min_profit_factor: 1.0
  min_sharpe: 0.5
  wfo_positive_ratio: 0.6
  mc_percentile: 60
