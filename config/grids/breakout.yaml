# Breakout Strategy Family Grid (OPTIMIZED)
# Reduced from 628,992 → ~24,000 configs (26x reduction)
# Based on: Volatility expansion, range breakouts, momentum confirmation

family: breakout

strategies:
  volatility:
    atr_period: [10, 20]          # 3 → 2: standard/long
    atr_mult: [1.5, 2.0]          # 3 → 2: moderate/strong
    lookback: [20, 40]            # 3 → 2: medium/long
    vol_threshold: [1.2, 2.0]     # 4 → 2: moderate/extreme

  range:
    consolidation_period: [10, 20] # 4 → 2: medium/long
    breakout_threshold: [0.5, 1.0] # 4 → 2: moderate/strong
    atr_period: [14, 20]           # 3 → 2: standard/long

  momentum:
    lookback: [20, 30]             # 3 → 2: medium/long
    momentum_period: [10, 15]      # 3 → 2: medium/long
    momentum_threshold: [1.0, 1.5] # 3 → 2: moderate/strong
    volume_mult: [1.5, 2.0]        # 3 → 2: moderate/high

  atr_channel:
    sma_period: [20, 30]           # 3 → 2: medium/long
    atr_period: [14, 20]           # 3 → 2: standard/long
    atr_mult: [2.0, 3.0]           # 4 → 2: moderate/wide

# Risk management
risk:
  stop_loss_pct: [0.02, 0.025, 0.03]   # 4 → 3: wider for breakouts
  take_profit_pct: [0.04, 0.05, 0.06]  # 4 → 3: larger targets

# Trading costs
costs:
  profiles:
    conservative:
      slippage_bps: 5
      fee_taker_bps: 6
    base:
      slippage_bps: 3
      fee_taker_bps: 4

# Position settings
position:
  leverage: [1, 3]                # 4 → 2: conservative/aggressive
  allow_short: [true, false]

# Symbols and timeframes
symbols: [BTCUSDT]
timeframes: [1h, 4h]              # 3 → 2: intraday/swing

# Price source for execution
price_source: [next_open, close]

# Filters for overfitting detection
filters:
  min_trades: 25
  max_drawdown_pct: -35
  min_profit_factor: 1.2
  min_sharpe: 0.5
  wfo_positive_ratio: 0.55
  mc_percentile: 55
