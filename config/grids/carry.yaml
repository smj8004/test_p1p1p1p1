# Carry Strategy Family Grid (OPTIMIZED)
# Reduced from 69,984 → ~5,000 configs (14x reduction)
# Based on: Funding rate arbitrage, premium/discount, yield differential

family: carry

strategies:
  funding_rate:
    funding_threshold: [0.0001, 0.0002]  # 3 → 2: moderate/high
    ema_period: [20, 30]                 # 3 → 2: medium/long
    lookback: [16, 24]                   # 3 → 2: medium/long

  premium:
    premium_threshold: [0.005, 0.01]     # 3 → 2: moderate/high
    lookback: [24, 48]                   # 3 → 2: medium/long
    ema_period: [20, 30]                 # 3 → 2: medium/long

  yield:
    yield_period: [24, 48]               # 3 → 2: medium/long
    yield_threshold: [0.002, 0.003]      # 3 → 2: moderate/high
    momentum_period: [12, 24]            # 3 → 2: medium/long

  momentum:
    momentum_fast: [10, 15]              # 3 → 2: fast/medium
    momentum_slow: [30, 50]              # 3 → 2: medium/long
    carry_period: [24, 48]               # 3 → 2: medium/long
    carry_weight: [0.3, 0.4]             # 3 → 2: moderate/high

# Risk management
risk:
  stop_loss_pct: [0.01, 0.02]            # 3 → 2: tight for carry
  take_profit_pct: [0.02, 0.03]          # 3 → 2: moderate targets

# Trading costs
costs:
  profiles:
    conservative:
      slippage_bps: 5
      fee_taker_bps: 6
    base:
      slippage_bps: 3
      fee_taker_bps: 4

# Position settings
position:
  leverage: [1, 2]                       # 2 → 2: keep both
  allow_short: [true, false]

# Symbols and timeframes
symbols: [BTCUSDT]
timeframes: [1h, 4h]                     # 2 → 2: keep both

# Price source for execution
price_source: [next_open, close]

# Filters for overfitting detection
filters:
  min_trades: 30
  max_drawdown_pct: -25
  min_profit_factor: 1.2
  min_sharpe: 0.6
  wfo_positive_ratio: 0.6
  mc_percentile: 55
